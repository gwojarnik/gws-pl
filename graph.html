<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>gws.pl — Graf wiedzy</title>
<meta name="description" content="gws.pl jako interaktywny graf wiedzy — strategia, doradztwo i szkolenia AI, eksplorowane przez sieć powiązań.">
<link rel="alternate" hreflang="pl" href="https://gws.pl/graf/">
<link rel="alternate" hreflang="en" href="https://gws.pl/en/graph/">
<link rel="alternate" hreflang="x-default" href="https://gws.pl/graf/">
<link rel="stylesheet" href="./styles.css">
<link rel="stylesheet" href="graph.css">
<script>
  (function () {
    try {
      var savedTheme = localStorage.getItem('gws-theme');
      var explicitTheme = localStorage.getItem('gws-theme-explicit') === '1';
      var th = explicitTheme && savedTheme ? savedTheme : 'light';
      if (!explicitTheme && savedTheme !== 'light') localStorage.setItem('gws-theme', 'light');
      var lg = localStorage.getItem('gws-lang') || 'pl';
      document.documentElement.setAttribute('data-theme', th);
      document.documentElement.setAttribute('lang', lg);
    } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
  })();
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>window.__GWS_PAGE = 'graph';</script>
<script src="./_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>

<script>
  (function () {
    var ds = window.GwsPlDesignSystem_50b22c;
    if (!ds || !ds.NODES || !ds.EDGES || !ds.FILTER_GROUPS) return;

    function localizeNodes(lang) {
      return ds.NODES.map(function (n) {
        return Object.assign({}, n, {
          label: n[lang].label,
          summary: n[lang].summary,
          subtitle: n[lang].subtitle,
          body: n[lang].body,
          forWhom: n[lang].forWhom,
          format: n[lang].format
        });
      });
    }

    function neighborsOf(id) {
      var out = [];
      ds.EDGES.forEach(function (e) {
        if (e.source === id) out.push(e.target);
        else if (e.target === id) out.push(e.source);
      });
      return Array.from(new Set(out));
    }

    window.GWS_GRAPH = {
      NODES: ds.NODES,
      EDGES: ds.EDGES,
      FILTER_GROUPS: ds.FILTER_GROUPS,
      localizeNodes: localizeNodes,
      neighborsOf: neighborsOf
    };
    window.dispatchEvent(new Event('gws-graph-ready'));
  })();
</script>
</body>
</html>
