<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>gws.pl — Strategia. Ludzie. Wyniki.</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#faf6ef; --card:#ffffff; --paper:#f7f1e6;
    --ink:#1f2937; --ink-2:#2d3748; --mute:#6b7280;
    --line:#e8e0d0; --gold:#c89758; --gold-d:#a87a3e;
    --gold-l:#e3c79a; --gold-bg:#f0e3cc;
    --warm:#b8916a; --warm-d:#8d6b4a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:"Plus Jakarta Sans",system-ui,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .serif{font-family:"Fraunces",Georgia,serif}
  .wrap{max-width:1240px;margin:0 auto;padding:0 32px}
  @media (max-width:720px){.wrap{padding:0 20px}}

  .top{position:sticky;top:0;z-index:40;background:rgba(250,246,239,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .top-inner{max-width:1240px;margin:0 auto;padding:18px 32px;display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:24px}
  .mark{font-family:"Fraunces";font-size:24px;font-weight:600;letter-spacing:-.01em;color:var(--ink)}
  .nav{display:flex;gap:32px;justify-content:center}
  .nav a{font-size:14px;color:var(--ink-2);font-weight:500;transition:color .2s}
  .nav a:hover{color:var(--gold-d)}
  .lang{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:3px;background:var(--card)}
  .lang button{border:0;background:transparent;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.06em;padding:6px 12px;border-radius:999px;cursor:pointer;color:var(--mute);transition:all .2s}
  .lang button.on{background:var(--gold);color:#fff}
  .btn{display:inline-flex;align-items:center;gap:10px;padding:12px 22px;border-radius:999px;font-weight:600;font-size:14px;cursor:pointer;border:0;transition:all .2s;font-family:inherit}
  .btn-primary{background:var(--gold);color:#fff}
  .btn-primary:hover{background:var(--gold-d)}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
  .btn-ghost:hover{background:var(--ink);color:#fff}
  .btn .arr{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.25);display:inline-grid;place-items:center;font-size:12px}
  .btn-ghost .arr{background:rgba(31,41,55,.1)}
  @media (max-width:900px){.nav{display:none}.top-inner{grid-template-columns:1fr auto auto}}

  .hero{position:relative;padding:80px 0 100px;overflow:hidden}
  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center}
  .hero h1{font-family:"Fraunces";font-size:clamp(40px,5.4vw,72px);line-height:1.05;letter-spacing:-.02em;font-weight:600;margin:0 0 24px;color:var(--ink)}
  .hero p.lead{font-size:17px;line-height:1.6;color:var(--mute);max-width:48ch;margin:0 0 36px}
  .hero-actions{display:flex;gap:14px;flex-wrap:wrap}
  .hero-art{position:relative;aspect-ratio:1/.85;border-radius:24px;overflow:hidden}
  .hero-art svg{position:absolute;inset:0;width:100%;height:100%}
  @media (max-width:900px){.hero-grid{grid-template-columns:1fr}.hero{padding:48px 0 64px}.hero-art{aspect-ratio:1/.7}}

  section{padding:88px 0;border-top:1px solid var(--line)}
  .sec-grid{display:grid;grid-template-columns:280px 1fr;gap:64px;align-items:start}
  .sec-eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-d);font-weight:600;margin-bottom:16px}
  .sec-title{font-family:"Fraunces";font-size:clamp(26px,2.6vw,36px);line-height:1.1;letter-spacing:-.01em;font-weight:600;margin:0;color:var(--ink)}
  @media (max-width:900px){.sec-grid{grid-template-columns:1fr;gap:32px}}

  .cards-4{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
  .m-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:28px 22px;display:flex;flex-direction:column;gap:14px;transition:all .25s}
  .m-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px -16px rgba(168,122,62,.25);border-color:var(--gold-l)}
  .m-card .row{display:flex;justify-content:space-between;align-items:center}
  .m-card .num{font-family:"Fraunces";font-size:34px;font-weight:500;color:var(--ink);line-height:1}
  .m-card .ico{width:34px;height:34px;color:var(--gold-d)}
  .m-card h3{font-family:"Fraunces";font-size:17px;font-weight:600;line-height:1.25;margin:0;letter-spacing:-.005em;color:var(--ink)}
  .m-card p{font-size:13px;line-height:1.55;color:var(--mute);margin:0}
  @media (max-width:1000px){.cards-4{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:560px){.cards-4{grid-template-columns:1fr}}

  .about-card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:0;overflow:hidden}
  .about-grid{display:grid;grid-template-columns:0.85fr 1.15fr;gap:0;align-items:center}
  .about-portrait{position:relative;aspect-ratio:4/4.6;background:var(--paper);overflow:hidden}
  .about-portrait svg{position:absolute;inset:0;width:100%;height:100%}
  .about-body-wrap{padding:48px 56px}
  .about-body-wrap h3{font-family:"Fraunces";font-size:clamp(22px,2.4vw,30px);line-height:1.15;font-weight:600;margin:0 0 20px;letter-spacing:-.01em;color:var(--ink)}
  .about-body-wrap p{font-size:14.5px;line-height:1.65;color:var(--mute);margin:0 0 14px;max-width:60ch}
  .about-pillars{display:flex;gap:8px;margin:32px 0 28px;flex-wrap:wrap}
  .pillar{flex:1;min-width:120px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;padding:14px 8px}
  .pillar .pico{width:34px;height:34px;color:var(--gold-d)}
  .pillar .pk{font-size:12px;font-weight:600;color:var(--ink-2);line-height:1.2;max-width:14ch}
  .about-cta{display:inline-flex;align-items:center;gap:10px;padding:11px 20px;border-radius:999px;border:1.5px solid var(--ink);font-size:13px;font-weight:600;cursor:pointer;background:transparent;transition:all .2s;font-family:inherit;color:var(--ink)}
  .about-cta:hover{background:var(--ink);color:#fff}
  @media (max-width:900px){.about-grid{grid-template-columns:1fr}.about-portrait{aspect-ratio:4/3}.about-body-wrap{padding:32px 24px}}

  .svc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px}
  .svc-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 18px;display:flex;flex-direction:column;gap:12px;text-align:center;align-items:center;transition:all .25s;cursor:pointer}
  .svc-card:hover{transform:translateY(-3px);box-shadow:0 12px 28px -14px rgba(168,122,62,.22);border-color:var(--gold-l)}
  .svc-card .ico{width:38px;height:38px;color:var(--gold-d)}
  .svc-card h3{font-family:"Fraunces";font-size:15px;font-weight:600;line-height:1.2;margin:0;letter-spacing:-.005em;color:var(--ink);min-height:2.4em}
  .svc-card p{font-size:12px;line-height:1.5;color:var(--mute);margin:0}
  .svc-link{font-size:13px;color:var(--gold-d);font-weight:600;display:inline-flex;align-items:center;gap:8px;cursor:pointer}
  @media (max-width:1100px){.svc-grid{grid-template-columns:repeat(3,1fr)}}
  @media (max-width:640px){.svc-grid{grid-template-columns:repeat(2,1fr)}}

  .extras-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .extra-card{position:relative;border-radius:22px;padding:36px 36px 32px;color:#fff;overflow:hidden;display:flex;gap:24px;align-items:flex-start;min-height:200px}
  .extra-card.gold{background:linear-gradient(135deg,#c89758 0%,#a87a3e 100%)}
  .extra-card.warm{background:linear-gradient(135deg,#a07556 0%,#7a5638 100%)}
  .extra-card .badge{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.18);display:grid;place-items:center;flex-shrink:0}
  .extra-card .badge svg{width:28px;height:28px;color:#fff}
  .extra-card h3{font-family:"Fraunces";font-size:21px;line-height:1.2;margin:0 0 10px;font-weight:600;letter-spacing:-.005em;max-width:18ch}
  .extra-card p{font-size:13.5px;line-height:1.55;margin:0;opacity:.92;max-width:42ch}
  .extra-card .arr{position:absolute;right:24px;bottom:24px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;color:#fff;font-size:14px;cursor:pointer;transition:background .2s}
  @media (max-width:760px){.extras-grid{grid-template-columns:1fr}}

  .planner-stepper{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:36px}
  .planner-stepper::before{content:"";position:absolute;top:18px;left:11%;right:11%;height:1px;border-top:1px dashed var(--line);z-index:0}
  .pstep{position:relative;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;z-index:1}
  .pdot{width:38px;height:38px;border-radius:50%;background:var(--card);border:1.5px solid var(--line);color:var(--mute);font-weight:600;font-size:14px;display:grid;place-items:center}
  .pstep.active .pdot{background:var(--gold);color:#fff;border-color:var(--gold)}
  .pstep h4{font-family:"Fraunces";font-size:16px;font-weight:600;margin:0;color:var(--ink)}
  .pstep p{font-size:12px;color:var(--mute);margin:0;max-width:18ch}

  .planner-body{display:grid;grid-template-columns:1.1fr .9fr;gap:24px;align-items:start}
  .pchoices{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px}
  .pchoices h4{font-family:"Fraunces";font-size:16px;margin:0 0 12px;color:var(--ink);font-weight:600}
  .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  .chip-row:last-child{margin-bottom:0}
  .chip{font-size:12px;font-weight:500;padding:9px 14px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--ink-2);cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;flex-direction:column;align-items:flex-start;gap:2px;text-align:left}
  .chip:hover{border-color:var(--gold)}
  .chip.on{background:var(--gold);color:#fff;border-color:var(--gold)}
  .chip .d{font-size:10.5px;font-weight:400;opacity:.8}
  .chip.on .d{color:#fff;opacity:.9}

  .plan-card{background:linear-gradient(145deg,#1f2937 0%,#0f1721 100%);color:#fff;border-radius:18px;padding:28px;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
  .plan-card::before{content:"";position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(200,151,88,.35),transparent 70%)}
  .pc-top{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);position:relative;z-index:1}
  .plan-card h4{font-family:"Fraunces";font-size:22px;line-height:1.15;margin:8px 0 4px;font-weight:600;letter-spacing:-.005em;position:relative;z-index:1}
  .plan-card .sub{font-size:13px;color:rgba(255,255,255,.7);margin:0 0 12px;position:relative;z-index:1}
  .plan-mods{display:flex;flex-direction:column;gap:0;position:relative;z-index:1}
  .pmod{display:grid;grid-template-columns:42px 1fr auto;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.1);align-items:baseline;font-size:13.5px}
  .pmod:last-child{border-bottom:0}
  .pmod .i{color:rgba(255,255,255,.4);font-size:11px;letter-spacing:.1em}
  .pmod .h{color:var(--gold-l);font-size:11.5px;font-weight:600}
  .plan-foot{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:end;padding-top:16px;border-top:1px solid rgba(255,255,255,.18);position:relative;z-index:1}
  .plan-foot .lbl{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.5);display:block;margin-bottom:4px}
  .plan-foot .v{font-family:"Fraunces";font-size:18px;line-height:1.2}
  .plan-foot .total{font-size:24px;color:var(--gold-l)}
  .plan-cta{margin-top:16px;width:100%;padding:14px;background:var(--gold);color:#fff;border:0;border-radius:999px;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;transition:background .2s;position:relative;z-index:1}
  .plan-cta:hover{background:var(--gold-d)}
  @media (max-width:900px){.planner-body{grid-template-columns:1fr}.planner-stepper{grid-template-columns:repeat(2,1fr);gap:24px}.planner-stepper::before{display:none}}

  .faq-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 32px}
  .faq-item{border-bottom:1px solid var(--line)}
  .faq-q{display:flex;justify-content:space-between;align-items:center;padding:18px 4px;cursor:pointer;gap:16px}
  .faq-q .t{font-family:"Fraunces";font-size:15px;font-weight:500;color:var(--ink);line-height:1.3}
  .faq-q .x{width:26px;height:26px;display:grid;place-items:center;color:var(--gold-d);font-size:18px;flex-shrink:0;transition:transform .25s}
  .faq-item.on .faq-q .x{transform:rotate(45deg)}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .35s,padding .35s;padding:0 4px}
  .faq-item.on .faq-a{max-height:320px;padding:0 4px 18px}
  .faq-a p{font-size:13.5px;line-height:1.6;color:var(--mute);margin:0;max-width:46ch}
  @media (max-width:760px){.faq-grid{grid-template-columns:1fr}}

  .contact-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:32px;align-items:start}
  .c-info{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:28px;display:flex;flex-direction:column;gap:16px}
  .c-line{display:flex;align-items:center;gap:14px;font-size:14px;color:var(--ink-2)}
  .c-line .icon-wrap{width:36px;height:36px;border-radius:10px;background:var(--gold-bg);color:var(--gold-d);display:grid;place-items:center;flex-shrink:0}
  .c-line .icon-wrap svg{width:18px;height:18px}
  @media (max-width:900px){.contact-grid{grid-template-columns:1fr}}

  footer{background:var(--ink);color:rgba(255,255,255,.7);padding:48px 0 32px;margin-top:80px;position:relative;overflow:hidden}
  footer::before{content:"";position:absolute;left:0;bottom:0;width:30%;height:80%;background:radial-gradient(ellipse at left,rgba(200,151,88,.18),transparent 70%);pointer-events:none}
  .foot-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr auto;gap:32px;align-items:start;position:relative;z-index:1}
  .foot-grid .mark{color:#fff;display:block;margin-bottom:8px}
  .foot-grid .col h5{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.45);font-weight:600;margin:0 0 14px}
  .foot-grid .col a{display:block;font-size:13.5px;color:rgba(255,255,255,.75);margin-bottom:8px}
  .foot-grid .col a:hover{color:var(--gold-l)}
  .foot-bot{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.4);padding-top:24px;margin-top:32px;border-top:1px solid rgba(255,255,255,.1);position:relative;z-index:1;flex-wrap:wrap;gap:12px}
  .li{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.08);color:#fff;display:grid;place-items:center}
  .li:hover{background:var(--gold)}
  @media (max-width:760px){.foot-grid{grid-template-columns:1fr 1fr;gap:24px}}
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <a class="mark" href="#top">gws.pl</a>
    <nav class="nav" id="nav"></nav>
    <div class="lang" id="lang">
      <button data-lang="pl">PL</button>
      <button data-lang="en">EN</button>
    </div>
    <button class="btn btn-primary" id="btn-cta-top" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})"><span data-i18n="ui.cta_primary"></span> <span class="arr">→</span></button>
  </div>
</header>

<a id="top"></a>

<section class="hero" style="border-top:0">
  <div class="wrap">
    <div class="hero-grid">
      <div>
        <h1 data-i18n="sections.hero.h1"></h1>
        <p class="lead" data-i18n="sections.hero.lead"></p>
        <div class="hero-actions">
          <button class="btn btn-primary" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})"><span data-i18n="ui.cta_primary"></span> <span class="arr">→</span></button>
          <button class="btn btn-ghost" onclick="document.getElementById('manifest').scrollIntoView({behavior:'smooth'})"><span data-i18n="ui.cta_manifest"></span> <span class="arr">→</span></button>
        </div>
      </div>
      <div class="hero-art">
        <svg viewBox="0 0 600 510" preserveAspectRatio="xMidYMid slice">
          <defs>
            <radialGradient id="wash1" cx="60%" cy="40%" r="60%"><stop offset="0%" stop-color="#e3c79a" stop-opacity=".95"/><stop offset="60%" stop-color="#c89758" stop-opacity=".55"/><stop offset="100%" stop-color="#c89758" stop-opacity="0"/></radialGradient>
            <radialGradient id="wash2" cx="30%" cy="80%" r="50%"><stop offset="0%" stop-color="#b8916a" stop-opacity=".7"/><stop offset="100%" stop-color="#b8916a" stop-opacity="0"/></radialGradient>
            <radialGradient id="wash3" cx="80%" cy="80%" r="40%"><stop offset="0%" stop-color="#a87a3e" stop-opacity=".6"/><stop offset="100%" stop-color="#a87a3e" stop-opacity="0"/></radialGradient>
          </defs>
          <rect width="600" height="510" fill="#f7f1e6"/>
          <ellipse cx="380" cy="200" rx="260" ry="220" fill="url(#wash1)"/>
          <ellipse cx="180" cy="400" rx="200" ry="160" fill="url(#wash2)"/>
          <ellipse cx="480" cy="420" rx="180" ry="140" fill="url(#wash3)"/>
          <g fill="none" stroke="#c89758" stroke-width="1" opacity=".5"><circle cx="380" cy="200" r="120"/><circle cx="380" cy="200" r="180"/></g>
        </svg>
      </div>
    </div>
  </div>
</section>

<section id="manifest">
  <div class="wrap"><div class="sec-grid">
    <div><div class="sec-eyebrow" data-i18n="sections.manifest.eyebrow"></div><h2 class="sec-title" data-i18n="sections.manifest.title"></h2></div>
    <div class="cards-4" id="manifest-list"></div>
  </div></div>
</section>

<section id="about">
  <div class="wrap"><div class="sec-grid">
    <div><div class="sec-eyebrow" data-i18n="sections.about_outer.eyebrow"></div><h2 class="sec-title" data-i18n="sections.about_outer.title"></h2></div>
    <div class="about-card"><div class="about-grid">
      <div class="about-portrait">
        <svg viewBox="0 0 400 460" preserveAspectRatio="xMidYMid slice">
          <defs>
            <radialGradient id="pwash1" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#e3c79a" stop-opacity=".9"/><stop offset="100%" stop-color="#e3c79a" stop-opacity="0"/></radialGradient>
            <radialGradient id="pwash2" cx="60%" cy="70%" r="55%"><stop offset="0%" stop-color="#b8916a" stop-opacity=".7"/><stop offset="100%" stop-color="#b8916a" stop-opacity="0"/></radialGradient>
            <linearGradient id="pgrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#3a3024"/><stop offset="100%" stop-color="#1f1810"/></linearGradient>
          </defs>
          <rect width="400" height="460" fill="#f7f1e6"/>
          <ellipse cx="200" cy="200" rx="220" ry="200" fill="url(#pwash1)"/>
          <ellipse cx="220" cy="320" rx="180" ry="140" fill="url(#pwash2)"/>
          <g opacity=".85">
            <ellipse cx="200" cy="170" rx="50" ry="58" fill="url(#pgrad)"/>
            <path d="M120 460 Q 120 320 160 280 Q 200 250 240 280 Q 280 320 280 460 Z" fill="url(#pgrad)"/>
            <path d="M155 290 Q 200 270 245 290 L 250 360 Q 200 350 150 360 Z" fill="#d4b890" opacity=".7"/>
          </g>
        </svg>
      </div>
      <div class="about-body-wrap">
        <div class="sec-eyebrow" style="margin-bottom:10px" data-i18n="sections.about_inner.eyebrow"></div>
        <h3 data-i18n="sections.about_inner.title"></h3>
        <div id="about-body"></div>
        <div class="about-pillars" id="about-pillars"></div>
        <button class="about-cta"><span data-i18n="ui.about_cta"></span> <span style="display:inline-grid;place-items:center;width:20px;height:20px;border-radius:50%;background:rgba(31,41,55,.1);font-size:11px">→</span></button>
      </div>
    </div></div>
  </div></div>
</section>

<section id="services">
  <div class="wrap"><div class="sec-grid">
    <div><div class="sec-eyebrow" data-i18n="sections.services.eyebrow"></div><h2 class="sec-title" data-i18n="sections.services.title"></h2></div>
    <div>
      <div class="svc-grid" id="svc-grid"></div>
      <a href="#planner" class="svc-link"><span data-i18n="ui.services_link"></span> <span>→</span></a>
    </div>
  </div></div>
</section>

<section id="extras">
  <div class="wrap"><div class="sec-grid">
    <div><div class="sec-eyebrow" data-i18n="sections.extras.eyebrow"></div><h2 class="sec-title" data-i18n="sections.extras.title"></h2></div>
    <div class="extras-grid" id="extras-grid"></div>
  </div></div>
</section>

<section id="planner">
  <div class="wrap"><div class="sec-grid">
    <div><div class="sec-eyebrow" data-i18n="sections.planner.eyebrow"></div><h2 class="sec-title" data-i18n="sections.planner.title"></h2></div>
    <div>
      <div class="planner-stepper" id="planner-stepper"></div>
      <div class="planner-body">
        <div class="pchoices">
          <h4 data-i18n="ui.planner_q.audience"></h4><div class="chip-row" id="c-audience"></div>
          <h4><span data-i18n="ui.planner_q.goals"></span> <span style="font-size:11.5px;font-weight:400;color:var(--mute)" data-i18n="ui.planner_q.goals_hint"></span></h4><div class="chip-row" id="c-goals"></div>
          <h4 data-i18n="ui.planner_q.duration"></h4><div class="chip-row" id="c-duration"></div>

    <div class="faq-grid" id="faq-grid"></div>

</section>

  <div class="wrap"><div class="sec-grid">
    <div><div class="sec-eyebrow" data-i18n="sections.contact.eyebrow"></div><h2 class="sec-title" data-i18n="sections.contact.title"></h2></div>
    <div class="contact-grid">
      <div class="c-info" id="c-info"></div>
    </div>
  </div></div>
</section>

<footer>
  <div class="wrap">
    <div class="foot-grid">
      <div>
        <span class="mark">gws.pl</span>
        <p style="font-size:13px;color:rgba(255,255,255,.55);margin:0;max-width:30ch" data-i18n="ui.footer.tagline"></p>
      </div>
      <div class="col" id="foot-nav-1"></div>
      <div class="col" id="foot-nav-2"></div>
      <a id="foot-li" href="#" class="li" aria-label="LinkedIn"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM.22 8h4.56v14H.22V8zm7.5 0h4.37v1.92h.06c.6-1.14 2.07-2.34 4.27-2.34 4.57 0 5.42 3 5.42 6.92V22h-4.56v-6.78c0-1.62-.03-3.7-2.26-3.7-2.27 0-2.62 1.77-2.62 3.6V22H7.72V8z"/></svg></a>
    </div>
    <div class="foot-bot">
      <span data-i18n="ui.footer.rights"></span>
      <span><a href="#" data-i18n="ui.footer.privacy"></a> · <a href="#" data-i18n="ui.footer.terms"></a></span>
    </div>
  </div>
</footer>

<script src="i18n/translations.js"></script>
<script>
const LANGS = ['pl','en'];
function readSavedLang(){
  try { return localStorage.getItem('gws_lang'); }
  catch(e) { return null; }
}
function saveLang(lang){
  try { localStorage.setItem('gws_lang', lang); }
  catch(e) {}
}
let LANG = (readSavedLang() || (navigator.language||'pl').slice(0,2));
if(!LANGS.includes(LANG)) LANG = 'pl';
let T = {};

const mIcons = [
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="10" r="2.5"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/><path d="M14 20c0-2 2-4 4-4s4 1.5 4 4"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 21h18"/><path d="M5 21V10M10 21V6M15 21V13M20 21V8"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 12c-2 0-4-1.8-4-4s2-4 4-4 4 1.8 4 4M16 12c2 0 4 1.8 4 4s-2 4-4 4-4-1.8-4-4M8 12h8"/></svg>'
];
const sIcons = [
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="7"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M10 6h4M6 10v4M14 17h7"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 20h18M6 20V12M11 20V8M16 20V14M21 20V6"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M5 21c0-4 3-7 7-7s7 3 7 7"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 12a9 9 0 11-9-9"/><path d="M21 3v9h-9"/></svg>'
];
const eIcons = [
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v18M5 12c4 0 7-3 7-9M19 12c-4 0-7-3-7-9M5 12c4 0 7 3 7 9M19 12c-4 0-7 3-7 9"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/><path d="M9 12l2 2 4-4"/></svg>'
];
const pIcons = [
  '<svg class="pico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3l10 5-10 5L2 8l10-5z"/><path d="M6 10v5c0 2 3 3 6 3s6-1 6-3v-5"/></svg>',
  '<svg class="pico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M8 20h8M12 18v2"/><path d="M7 9l3 3 7-7"/></svg>',
  '<svg class="pico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 22c0-4 4-7 8-7s8 3 8 7"/></svg>'
];

function getPath(obj, path){ return path.split('.').reduce((a,k)=>a&&a[k], obj); }

const state = { audience:'board', goals:new Set(['strategy']), duration:'full', format:'onsite' };

async function loadLang(lang){
  try {
    if(window.GWS_TRANSLATIONS && window.GWS_TRANSLATIONS[lang]){
      T = window.GWS_TRANSLATIONS[lang];
    } else {
      const res = await fetch(`i18n/${lang}.json`);
      if(!res.ok) throw new Error(`Could not load ${lang} translations`);
      T = await res.json();
    }
  } catch(e) {
    console.warn('Falling back to bundled Polish translations.', e);
    lang = 'pl';
    T = window.GWS_TRANSLATIONS && window.GWS_TRANSLATIONS.pl;
    if(!T) return;
  }
  LANG = lang;
  saveLang(lang);
  document.documentElement.lang = lang;
  document.title = T.meta.title;
  render();
}

function render(){
  // text bindings
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const v = getPath(T, el.getAttribute('data-i18n'));
    if(v != null) el.textContent = v;
  });
  // lang switcher
  document.querySelectorAll('#lang button').forEach(b=>b.classList.toggle('on', b.dataset.lang===LANG));
  // nav
  document.getElementById('nav').innerHTML = Object.entries(T.ui.nav).map(([k,v])=>`<a href="#${k==='about'?'about':k==='services'?'services':k==='extras'?'extras':k==='planner'?'planner':k==='faq'?'faq':k==='contact'?'contact':'manifest'}">${v}</a>`).join('');
  // manifest
  document.getElementById('manifest-list').innerHTML = T.manifest.map((m,i)=>`
    <div class="m-card"><div class="row"><span class="num">0${i+1}</span><span class="ico">${mIcons[i]}</span></div><h3>${m.title}</h3><p>${m.text}</p></div>
  `).join('');
  // about
  document.getElementById('about-body').innerHTML = T.about.body.split('\n\n').map(p=>`<p>${p}</p>`).join('');
  document.getElementById('about-pillars').innerHTML = T.about.pillars.map((p,i)=>`<div class="pillar">${pIcons[i]}<span class="pk">${p}</span></div>`).join('');
  // services
  document.getElementById('svc-grid').innerHTML = T.services.map((s,i)=>`<div class="svc-card"><span class="ico">${sIcons[i]}</span><h3>${s.title}</h3><p>${s.short}</p></div>`).join('');
  // extras
  document.getElementById('extras-grid').innerHTML = T.extras.map((s,i)=>`<div class="extra-card ${i===0?'gold':'warm'}"><span class="badge">${eIcons[i]}</span><div><h3>${s.title}</h3><p>${s.body}</p></div><span class="arr">→</span></div>`).join('');
  // faq
  document.getElementById('faq-grid').innerHTML = T.faq.map(f=>`<div class="faq-item"><div class="faq-q"><span class="t">${f.q}</span><span class="x">+</span></div><div class="faq-a"><p>${f.a}</p></div></div>`).join('');
  document.querySelectorAll('.faq-q').forEach(q=>q.addEventListener('click',()=>q.parentElement.classList.toggle('on')));
  // stepper
  document.getElementById('planner-stepper').innerHTML = T.ui.stepper.map((s,i)=>`<div class="pstep ${i===0?'active':''}"><div class="pdot">${i+1}</div><h4>${s.h}</h4><p>${s.p}</p></div>`).join('');
  // contact info
  document.getElementById('c-info').innerHTML = `
    <div class="c-line"><span class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></span><span><a href="mailto:${T.contact.email}" style="color:inherit;text-decoration:none">${T.contact.email}</a></span></div>
    <div class="c-line"><span class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 4h4l2 5-3 2a12 12 0 005 5l2-3 5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2"/></svg></span><span>${T.contact.phone}</span></div>
    ${T.contact.city ? `<div class="c-line"><span class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s7-7 7-13a7 7 0 10-14 0c0 6 7 13 7 13z"/><circle cx="12" cy="9" r="2.5"/></svg></span><span>${T.contact.city}</span></div>` : ''}
    <div class="c-line"><span class="icon-wrap"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM.22 8h4.56v14H.22V8zm7.5 0h4.37v1.92h.06c.6-1.14 2.07-2.34 4.27-2.34 4.57 0 5.42 3 5.42 6.92V22h-4.56v-6.78c0-1.62-.03-3.7-2.26-3.7-2.27 0-2.62 1.77-2.62 3.6V22H7.72V8z"/></svg></span><span><a href="${T.contact.linkedin_url}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;border-bottom:1px solid var(--gold-l)">${T.contact.linkedin}</a></span></div>
  `;
  // footer
  document.getElementById('foot-nav-1').innerHTML = `<h5>${T.ui.footer.h_nav}</h5>${['manifest','about','services','extras'].map(k=>`<a href="#${k}">${T.ui.nav[k]}</a>`).join('')}`;
  document.getElementById('foot-nav-2').innerHTML = `<h5>${T.ui.footer.h_coop}</h5>${['planner','faq','contact'].map(k=>`<a href="#${k}">${T.ui.nav[k]}</a>`).join('')}`;
  document.getElementById('foot-li').href = T.contact.linkedin_url;

  renderChips(); renderPlan();
}

function renderChips(){
  const mk=(elId,items,type)=>{
    document.getElementById(elId).innerHTML = items.map(it=>{
      const on = type==='goals' ? state.goals.has(it.id) : state[type]===it.id;
      return `<button class="chip ${on?'on':''}" data-id="${it.id}" data-type="${type}">${it.label}${it.desc?`<span class="d">${it.desc}</span>`:''}</button>`;
    }).join('');
  };
  mk('c-audience', T.planner.audiences, 'audience');
  mk('c-goals',    T.planner.goals,     'goals');
  mk('c-duration', T.planner.durations, 'duration');
  mk('c-format',   T.planner.format,    'format');
  document.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{
    const id=ch.dataset.id, type=ch.dataset.type;
    if(type==='goals'){ if(state.goals.has(id)) state.goals.delete(id); else state.goals.add(id); if(state.goals.size===0) state.goals.add(id); }
    else state[type]=id;
    renderChips(); renderPlan();
  }));
}

function renderPlan(){
  const aud = T.planner.audiences.find(a=>a.id===state.audience);
  const goalIds = [...state.goals];
  const goals = goalIds.map(g=>T.planner.goals.find(x=>x.id===g));
  const dur = T.planner.durations.find(d=>d.id===state.duration);
  const fmt = T.planner.format.find(f=>f.id===state.format);

  const totalHours = dur.hours, introH = 0.5, outroH = 0.5;
  let budget = totalHours - introH - outroH;
  if(budget < 1) budget = totalHours - 0.5;

  const pools = goalIds.map(g=>T.planner.modules[g].slice());
  const picked = []; let acc = 0; let safety = 50;
  while(safety-- > 0){
    let added = false;
    for(const pool of pools){
      if(pool.length===0) continue;
      const m = pool.shift();
      const remaining = budget - acc;
      if(remaining < 0.5){ added=false; break; }
      const h = Math.min(m.h, Math.max(0.5, Math.round(remaining*2)/2));
      picked.push({t:m.t, h:h}); acc += h; added = true;
      if(acc >= budget - 0.25) break;
    }
    if(!added || acc >= budget - 0.25) break;
  }
  const slack = budget - acc;
  if(slack >= 0.5 && picked.length){
    picked[picked.length-1].h = Math.round((picked[picked.length-1].h + slack)*2)/2;
  }

  const allMods = [
    {t: T.ui.planner_card.intro, h:introH},
    ...picked,
    {t: T.ui.planner_card.outro, h:outroH}
  ];
  const calculatedTotal = allMods.reduce((s,m)=>s+m.h,0);

  const title = `${T.planner.audSuffix[state.audience]||''} — ${T.planner.goalSuffix[goalIds[0]]||''}`;

  document.getElementById('plan-card').innerHTML = `
    <div class="pc-top"><span>${T.ui.planner_card.draft}</span><span>${new Date().toLocaleDateString(T.ui.locale)}</span></div>
    <h4>${title}</h4>
    <p class="sub">${aud.label} · ${dur.label} · ${fmt.label}</p>
    <div class="plan-mods">
      ${allMods.map((m,i)=>`<div class="pmod"><span class="i">${T.ui.planner_card.module}${String(i+1).padStart(2,'0')}</span><span>${m.t}</span><span class="h">${m.h}h</span></div>`).join('')}
    </div>
    <div class="plan-foot">
      <div><span class="lbl">${T.ui.planner_card.goals}</span><span class="v" style="font-size:13px;color:rgba(255,255,255,.85)">${goals.map(g=>g.label).join(' · ')}</span></div>
      <div style="text-align:right"><span class="lbl">${T.ui.planner_card.total}</span><span class="v total">${calculatedTotal}h</span></div>
    </div>
    <button class="plan-cta" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})">${T.ui.planner_cta} →</button>
  `;
}

document.querySelectorAll('#lang button').forEach(b=>b.addEventListener('click',()=>loadLang(b.dataset.lang)));
document.addEventListener('click',e=>{
  const a = e.target.closest('a[href^="#"]');
  if(a){ const id=a.getAttribute('href').slice(1); const el=document.getElementById(id); if(el){ e.preventDefault(); window.scrollTo({top:el.offsetTop-70,behavior:'smooth'}); } }
});

loadLang(LANG);
</script>
</body>
